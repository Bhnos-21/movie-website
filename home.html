<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinex</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <div class="container">
        <aside class="side">
            <div class="logo">
                <i class="fa-solid fa-film"></i>
                <span>Cinex</span>
            </div>
            <div class="menu">
                <h3 class="title">Main Menu</h3>
                <a href="#" class="item active">
                    <i class="fa-solid fa-house"></i>
                    <span>Home</span>
                </a>
                <a href="../Explore/explore.html" class="item">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <span>Explore</span>
                </a>
                <a href="../Genres/genres.html" class="item">
                    <i class="fa-solid fa-film"></i>
                    <span>Genres</span>
                </a>
                <a href="../Favorites/favorites.html" class="item">
                    <i class="fa-solid fa-heart"></i>
                    <span>Favourite</span>
                </a>
                <a href="../Profile/profile.html" class="item">
                    <i class="fa-solid fa-user"></i>
                    <span>Profile</span>
                </a>
             </div>
             <div class="auth">
                <a href="../Auth/signup.html" class="auth-btn">
                    <i class="fa-solid fa-user-plus"></i>
                    <span>Sign Up</span>
                </a>
                <a href="../Auth/login.html" class="auth-btn">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    <span>Login</span>
                </a>
            </div>
        </aside>

        <main class="main">
            <div class="hero">
                <video class="video" autoplay muted loop>
                    <source src="assets\video.mp4" type="video/mp4">
                </video>
                <div class="text">
                    <h1>Unlimited<br><span>Entertainment</span></h1>
                    <p class="desc">Your ultimate destination for the latest movies, Iconic favorites, and hidden gems. Curate your personal cinematic library today.</p>
                    <div class="tags">
                        <div class="tag">
                            <i class="fa-solid fa-crown"></i>
                            Premium Library
                        </div>
                        <div class="tag">
                            <i class="fa-solid fa-tv"></i>
                            4K-HDR
                        </div>
                         <a href="../Explore/explore.html" class="btn">
                            <i class="fa-solid fa-play"></i>
                               Explore Now
                         </a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
