<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Cinex</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>

    <div class="container">
        <aside class="side">
            <div class="logo">
                <i class="fa-solid fa-film"></i>
                <span>Cinex</span>
            </div>
            <div class="menu">
                <h3 class="title">Main Menu</h3>
                <a href="../Home/home.html" class="item">
                    <i class="fa-solid fa-house"></i>
                    <span>Home</span>
                </a>
                <a href="../Explore/explore.html" class="item">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <span>Explore</span>
                </a>
                <a href="../Genres/genres.html" class="item">
                    <i class="fa-solid fa-film"></i>
                    <span>Genres</span>
                </a>
                <a href="../Favorites/favorites.html" class="item">
                    <i class="fa-solid fa-heart"></i>
                    <span>Favourite</span>
                </a>
                <a href="#" class="item active">
                    <i class="fa-solid fa-user"></i>
                    <span>Profile</span>
                </a>
            </div>
            <div class="auth">
                <a href="../Auth/signup.html" class="auth-btn">
                    <i class="fa-solid fa-user-plus"></i>
                    <span>Sign Up</span>
                </a>
                <a href="../Auth/login.html" class="auth-btn">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    <span>Login</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <h1>My Profile</h1>
                <p style="color: var(--text-secondary);">Manage your account and view your activity.</p>
            </header>

            <section class="profile-header">
                <div class="avatar-circle">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="user-info">
                    <h2 id="userName">Movie Lover</h2>
                    <p id="userEmail">user@cinex.com</p>
                    <span class="member-badge">Member since <span id="joinDate">2024</span></span>
                </div>
                <div class="user-actions">
                    <button class="btn-edit"><i class="fa-solid fa-pen"></i> Edit Profile</button>
                </div>
            </section>

            <section class="stats-grid">
                <div class="stat-card">
                    <i class="fa-solid fa-heart" style="color: #e50914;"></i>
                    <h3 id="favCount">0</h3>
                    <p>Favourites</p>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-clock-rotate-left" style="color: #00d4ff;"></i>
                    <h3 id="historyCount">0</h3>
                    <p>History</p>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-star" style="color: #ffd700;"></i>
                    <h3>4.8</h3>
                    <p>Avg Rating</p>
                </div>
            </section>

            <section class="history-section">
                <div class="section-header">
                    <h2>Recent Activity</h2>
                    <button id="clearHistoryBtn" class="btn-text">Clear History</button>
                </div>
                <div class="history-list" id="historyList">
                </div>
            </section>
            
            <section class="settings-section">
                <h2>Settings</h2>
                <div class="setting-item">
                    <span>Dark Mode</span>
                    <div class="toggle-switch">
                        <input type="checkbox" id="darkModeToggle" checked>
                        <label for="darkModeToggle"></label>
                    </div>
                </div>
                <div class="setting-item">
                    <span>Data Management</span>
                    <button id="resetDataBtn" class="btn-danger">Reset All Data</button>
                </div>
            </section>
        </main>
    </div>

    <script src="../data.js"></script>
    <script src="profile.js"></script>
</body>
</html>
